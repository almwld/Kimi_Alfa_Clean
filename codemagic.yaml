workflows:
  build-apk:
    name: Build Android APK
    environment:
      flutter: 3.24.0
      xcode: latest
    scripts:
      - name: فرض Gradle 8.9
        script: |
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          echo "✅ Gradle wrapper updated to 8.9"
          cat android/gradle/wrapper/gradle-wrapper.properties
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
