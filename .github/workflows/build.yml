name: Build Flx

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'   # إصدار ثابت لضمان توافق الحزم

      - name: Create fresh Flutter project
        run: |
          mkdir -p /tmp/fresh
          cd /tmp/fresh
          flutter create --org com.flexyemen --project-name fresh_project .
          cd $GITHUB_WORKSPACE
          cp -r lib /tmp/fresh/
          cp -r assets /tmp/fresh/ 2>/dev/null || true
          cp pubspec.yaml /tmp/fresh/
          cp .env /tmp/fresh/ 2>/dev/null || true
          rm -rf lib assets pubspec.yaml .env android ios
          cp -r /tmp/fresh/. .
          rm -rf /tmp/fresh

      - name: Update AGP version and fix Gradle
        run: |
          # تحديث Android Gradle Plugin إلى 8.1.1
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "com.android.application" version "8.1.0"/id "com.android.application" version "8.1.1"/g' android/settings.gradle
            echo "✅ Updated AGP to 8.1.1"
          else
            echo "⚠️ android/settings.gradle not found"
          fi

      - name: Set app name and add flutterEmbedding
        run: |
          sed -i 's/android:label="fresh_project"/android:label="Flex Yemen Market"/g' android/app/src/main/AndroidManifest.xml
          # إضافة flutterEmbedding v2 لتجنب مشكلة Android v1
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches/

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
