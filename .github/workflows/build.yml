# ============================================================================
# GitHub Actions Workflow - Kimi_Alfa Flutter Build
# ============================================================================
name: Kimi_Alfa Build & Release

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.9'

jobs:
  setup:
    name: 🔧 Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v

  fix-android:
    name: 🛠️ Fix Android Structure
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Backup Custom Android Code
        run: |
          echo "📦 Backing up custom Android files..."
          mkdir -p /tmp/android_backup
          if [ -d "android/app/src/main/kotlin" ]; then
            cp -r android/app/src/main/kotlin /tmp/android_backup/ 2>/dev/null || true
          fi
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            cp android/app/src/main/AndroidManifest.xml /tmp/android_backup/ 2>/dev/null || true
          fi
          if [ -f "android/app/build.gradle" ]; then
            cp android/app/build.gradle /tmp/android_backup/ 2>/dev/null || true
          fi
          echo "✅ Backup completed"

      - name: Remove Old Android Directory
        run: |
          echo "🗑️ Removing old Android directory..."
          rm -rf android/
          echo "✅ Android directory removed"

      - name: Recreate Android with Flutter
        run: |
          echo "🔨 Recreating Android directory..."
          flutter create --platforms=android .
          echo "✅ Android recreated"

      - name: Setup Gradle 8.9
        run: |
          echo "⚙️ Setting up Gradle ${{ env.GRADLE_VERSION }}..."
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-all.zip
          WRAPPER
          echo "✅ Gradle wrapper configured"

      - name: Update Android Build Files
        run: |
          echo "📝 Updating Android build files..."
          
          cat > android/settings.gradle << 'SETTINGS'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.7.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          SETTINGS
          
          cat > android/build.gradle << 'BUILD'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          BUILD
          
          cat > android/gradle.properties << 'GRADLE_PROP'
          org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=3G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          android.defaults.buildfeatures.buildconfig=true
          android.nonTransitiveRClass=false
          android.nonFinalResIds=false
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          GRADLE_PROP
          echo "✅ Android build files updated"

      - name: Update App-Level Build.gradle
        run: |
          echo "📝 Updating app/build.gradle..."
          cat > android/app/build.gradle << 'APP_BUILD'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode', '1')
          def flutterVersionName = localProperties.getProperty('flutter.versionName', '1.0')
          
          android {
              namespace "com.kimialfa.app"
              compileSdkVersion 34
              ndkVersion "25.1.8937393"
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
              
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              
              defaultConfig {
                  applicationId "com.kimialfa.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }
              
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          
          flutter {
              source '../..'
          }
          
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
              implementation 'androidx.multidex:multidex:2.0.1'
          }
          APP_BUILD
          echo "✅ App build.gradle updated"

      - name: Restore Custom Kotlin Files
        run: |
          echo "🔄 Restoring custom Kotlin files..."
          mkdir -p android/app/src/main/kotlin/com/kimialfa/app
          cat > android/app/src/main/kotlin/com/kimialfa/app/MainActivity.kt << 'MAIN'
          package com.kimialfa.app
          
          import io.flutter.embedding.android.FlutterFragmentActivity
          
          class MainActivity: FlutterFragmentActivity() {
          }
          MAIN
          if [ -d "/tmp/android_backup/kotlin" ]; then
            cp -r /tmp/android_backup/kotlin/* android/app/src/main/kotlin/com/kimialfa/app/ 2>/dev/null || true
          fi
          echo "✅ Kotlin files restored"

      - name: Update AndroidManifest.xml
        run: |
          echo "📝 Updating AndroidManifest.xml..."
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Kimi Alfa"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          MANIFEST
          echo "✅ AndroidManifest.xml updated"

      - name: Create ProGuard Rules
        run: |
          cat > android/app/proguard-rules.pro << 'PROGUARD'
          # Flutter
          -keep class io.flutter.app.** { *; }
          -keep class io.flutter.plugin.** { *; }
          -keep class io.flutter.util.** { *; }
          -keep class io.flutter.view.** { *; }
          -keep class io.flutter.** { *; }
          -keep class io.flutter.plugins.** { *; }
          
          # Supabase
          -keep class io.supabase.** { *; }
          -keep class com.google.gson.** { *; }
          
          # General
          -keepattributes *Annotation*
          -keepattributes Signature
          -keepattributes Exceptions
          -keepattributes InnerClasses
          -keepattributes EnclosingMethod
          PROGUARD
          echo "✅ ProGuard rules created"

      - name: Upload Fixed Android
        uses: actions/upload-artifact@v4
        with:
          name: fixed-android
          path: android/

  create-env:
    name: 🔐 Create .env File
    runs-on: ubuntu-latest
    needs: fix-android
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Fixed Android
        uses: actions/download-artifact@v4
        with:
          name: fixed-android
          path: android/

      - name: Create .env from Secrets
        run: |
          echo "🔐 Creating .env file from GitHub Secrets..."
          cat > .env << EOF
          # Supabase Configuration
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          
          # Firebase Configuration
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          
          # API Keys
          MAP_API_KEY=${{ secrets.MAP_API_KEY }}
          PAYMENT_GATEWAY_KEY=${{ secrets.PAYMENT_GATEWAY_KEY }}
          
          # App Configuration
          APP_NAME=Kimi Alfa
          APP_VERSION=1.0.0
          BUILD_NUMBER=${{ github.run_number }}
          
          # Environment
          ENVIRONMENT=production
          DEBUG_MODE=false
          EOF
          echo "✅ .env file created"
          echo "📄 .env contents (masked):"
          cat .env | sed 's/=.*/=***/'

      - name: Upload .env
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env

  build-apk:
    name: 📱 Build APK
    runs-on: ubuntu-latest
    needs: [create-env, fix-android]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Download Fixed Android
        uses: actions/download-artifact@v4
        with:
          name: fixed-android
          path: android/

      - name: Download .env
        uses: actions/download-artifact@v4
        with:
          name: env-file
          path: .

      - name: Clean Gradle Cache Completely
        run: |
          echo "🧹 Cleaning Gradle cache..."
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/
          rm -rf android/.gradle/
          rm -rf android/app/.cxx/
          rm -rf build/
          rm -rf .dart_tool/
          echo "✅ Gradle cache cleaned"

      - name: Install Dependencies
        run: |
          echo "📦 Installing Flutter dependencies..."
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Verify Assets
        run: |
          echo "🔍 Verifying assets..."
          flutter pub run build_runner build --delete-conflicting-outputs 2>/dev/null || true
          mkdir -p assets/images assets/icons assets/fonts assets/animations
          if [ ! "$(ls -A assets/images 2>/dev/null)" ]; then
            echo "⚠️ No images found, creating placeholder..."
            touch assets/images/.gitkeep
          fi
          echo "✅ Assets verified"

      - name: Analyze Code
        run: |
          echo "🔍 Analyzing code..."
          flutter analyze --no-fatal-infos --no-fatal-warnings || true
          echo "✅ Analysis completed"

      - name: Build APK (Split per ABI)
        run: |
          echo "🔨 Building APK with --split-per-abi..."
          flutter build apk --release --split-per-abi --verbose
          echo "✅ Build completed"

      - name: Rename APKs with Version
        run: |
          echo "🏷️ Renaming APKs..."
          cd build/app/outputs/flutter-apk/
          VERSION="${{ github.run_number }}"
          for apk in *.apk; do
            if [[ $apk == app-*-release.apk ]]; then
              newname="kimi-alfa-${apk/app-/}"
              newname="${newname/-release/}"
              mv "$apk" "$newname"
              echo "Renamed: $apk -> $newname"
            fi
          done
          ls -lh *.apk

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kimi-alfa-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-aab:
    name: 📦 Build App Bundle
    runs-on: ubuntu-latest
    needs: [create-env, fix-android]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Download Fixed Android
        uses: actions/download-artifact@v4
        with:
          name: fixed-android
          path: android/

      - name: Download .env
        uses: actions/download-artifact@v4
        with:
          name: env-file
          path: .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: |
          echo "🔨 Building App Bundle..."
          flutter build appbundle --release --verbose
          echo "✅ AAB build completed"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/release/app-release.aab

  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [build-apk, build-aab]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: kimi-alfa-apks
          path: apks/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: aab/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Kimi Alfa v1.0.0+${{ github.run_number }}"
          tag_name: "v1.0.0+${{ github.run_number }}"
          body: |
            ## 🚀 Kimi Alfa Release v1.0.0+${{ github.run_number }}
            
            ### 📱 APK Downloads
            - `kimi-alfa-armeabi-v7a.apk` - للأجهزة القديمة (32-bit)
            - `kimi-alfa-arm64-v8a.apk` - للأجهزة الحديثة (64-bit) ⭐ **موصى به**
            - `kimi-alfa-x86_64.apk` - للمحاكيات
            
            ### 📦 App Bundle
            - `app-release.aab` - للرفع على Google Play Store
            
            ### 📝 Changes
            - Build number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            
            ### ⚠️ Notes
            - قم بتحميل النسخة المناسبة لمعالج جهازك
            - arm64-v8a هي النسخة الموصى بها لمعظم الأجهزة الحديثة
          files: |
            apks/*.apk
            aab/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
