name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود (lib, assets, .env)
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          cp .env /tmp/code/ 2>/dev/null || true

          # حذف مجلد android بالكامل
          rm -rf android ios

          # إنشاء مشروع Flutter جديد (سيُعيد إنشاء android بإعدادات نظيفة)
          flutter create --org com.kimialfa --project-name kimi_alfa --platforms android .

          # استعادة الكود
          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/.env . 2>/dev/null || true

          # تعديل pubspec.yaml: خفض path_provider إلى ^2.0.0 (لأنه يتطلب Dart 3.4.0، لكننا سنستخدم Flutter 3.22.0 لذا لا مشكلة)
          sed -i 's/path_provider: .*/path_provider: ^2.0.0/' pubspec.yaml
          # إزالة fonts لتجنب أخطاء الأصول
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml

          # إنشاء .env من GitHub Secrets
          cat > .env << 'ENV'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          MAP_API_KEY=${{ secrets.MAP_API_KEY }}
          ENV

          # إضافة flutterEmbedding v2
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          # فرض Kotlin 1.7.1 و Gradle 7.6.3
          cat > android/build.gradle << 'GRADLE'
          buildscript {
              ext.kotlin_version = '1.7.1'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.6.3'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          GRADLE

          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.3-all.zip" > android/gradle/wrapper/gradle-wrapper.properties

          # تنظيف cache Gradle بالكامل
          rm -rf ~/.gradle/caches/

          # بناء
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
