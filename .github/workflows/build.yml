name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # 1. حفظ الكود (lib و assets)
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true

          # 2. حذف مجلد android بالكامل
          rm -rf android ios

          # 3. إنشاء مشروع Flutter جديد (android فقط)
          flutter create --org com.kimialfa --project-name kimi_alfa --platforms android .

          # 4. استعادة الكود
          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true

          # 5. إنشاء .env من secrets
          cat > .env << 'ENV'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          MAP_API_KEY=${{ secrets.MAP_API_KEY }}
          ENV

          # 6. إزالة fonts من pubspec.yaml (لتفادي أخطاء الملفات المفقودة)
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml

          # 7. إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          # 8. تنظيف cache Gradle (للتخلص من الإصدارات القديمة)
          rm -rf ~/.gradle/caches/

          # 9. بناء APK
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
