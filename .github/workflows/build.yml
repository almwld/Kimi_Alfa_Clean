name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build
        run: |
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp pubspec.yaml /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          cp .env /tmp/code/ 2>/dev/null || true

          rm -rf android ios

          flutter create --org com.kimialfa --project-name kimi_alfa .

          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/pubspec.yaml .
          cp /tmp/code/.env . 2>/dev/null || true

          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts

          # تعديل pubspec.yaml: خفض إصدار path_provider وإزالة fonts
          sed -i 's/path_provider:.*/path_provider: ^2.0.0/' pubspec.yaml
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml

          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
