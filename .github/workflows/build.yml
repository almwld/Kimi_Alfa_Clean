name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build
        run: |
          # حفظ الكود (lib, assets, .env)
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          cp .env /tmp/code/ 2>/dev/null || true

          # حذف مجلد android القديم
          rm -rf android ios

          # إنشاء مشروع Flutter جديد مع منصة android فقط
          flutter create --org com.kimialfa --project-name kimi_alfa --platforms android .

          # استعادة الكود
          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/.env . 2>/dev/null || true

          # إضافة flutterEmbedding (لتجنب مشكلة Android v1)
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          # تنظيف cache Gradle بالكامل (للتخلص من Kotlin 1.9.0)
          rm -rf ~/.gradle/caches/

          # بناء
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
