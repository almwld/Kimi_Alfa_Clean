name: Kimi_Alfa Build & Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود (lib, assets)
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true

          # حذف أي مجلد android قديم
          rm -rf android ios

          # إنشاء مشروع Flutter جديد مع منصة android فقط
          flutter create --org com.kimialfa --project-name kimi_alfa --platforms android .

          # استعادة الكود
          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true

          # إنشاء .env من GitHub Secrets
          cat > .env << 'ENV'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          MAP_API_KEY=${{ secrets.MAP_API_KEY }}
          ENV

          # إزالة قسم fonts من pubspec.yaml (لتجنب أخطاء الأصول)
          sed -i '/fonts:/,/family: Changa/d' pubspec.yaml

          # إضافة flutterEmbedding v2
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          # تحديث Gradle wrapper إلى 8.9
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties

          # فرض Kotlin 1.9.22 و AGP 8.3.0
          cat > android/build.gradle << 'GRADLE'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          GRADLE

          # تحديث app/build.gradle لاستخدام نفس Kotlin
          cat > android/app/build.gradle << 'APP'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }

          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }

          android {
              namespace "com.kimialfa.kimi_alfa"
              compileSdk 34
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled true
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.kimialfa.kimi_alfa"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          APP

          # تنظيف cache Gradle بالكامل
          rm -rf ~/.gradle/caches/

          # بناء
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
