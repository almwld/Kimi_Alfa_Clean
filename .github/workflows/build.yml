name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - name: Build
        run: |
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          cp .env /tmp/code/ 2>/dev/null || true

          rm -rf android ios

          flutter create --org com.kimialfa --project-name kimi_alfa .

          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/.env . 2>/dev/null || true

          # حذف أي pubspec.yaml مستعاد ثم إنشاء ملف جديد
          rm -f pubspec.yaml
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            provider: ^6.1.1
            supabase_flutter: ^2.0.0
            carousel_slider: ^5.0.0
            flutter_animate: ^4.0.0
            flutter_svg: ^2.0.0
            image_picker: ^1.0.0
            cached_network_image: ^3.3.0
            shared_preferences: ^2.2.0
            intl: ^0.18.0
            url_launcher: ^6.2.0
            hive: ^2.2.0
            hive_flutter: ^1.1.0
            path_provider: ^2.0.0
            geolocator: ^11.0.0
            geocoding: ^3.0.0
            flutter_map: ^6.0.0
            latlong2: ^0.9.0
            flutter_local_notifications: ^17.0.0
            firebase_core: ^3.0.0
            firebase_messaging: ^15.0.0
            flutter_dotenv: ^5.0.0
            shimmer: ^3.0.0
            smooth_page_indicator: ^1.1.0
            flutter_screenutil: ^5.9.0
            google_fonts: ^6.0.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
            assets:
              - .env
              - assets/images/
              - assets/icons/svg/
              - assets/animations/
              - assets/fonts/
          YAML

          echo "=== pubspec.yaml بعد الإنشاء ==="
          grep "path_provider" pubspec.yaml

          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
