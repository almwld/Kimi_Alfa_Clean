name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Force Clean and Rebuild Android Config
        run: |
          rm -rf android/
          flutter create --project-name flex_yemen --platforms android .
          
          cat << 'SETTINGS' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("\${flutterSdkPath}/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.10" apply false
          }

          include ":app"
          SETTINGS

          cat << 'APP' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.example.flex_yemen"
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.flex_yemen"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          APP

          # إضافة flutterEmbedding
          sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml

          # تنظيف cache Gradle
          rm -rf ~/.gradle/caches/

      - name: Create compatible pubspec.yaml
        run: |
          # حذف أي pubspec.yaml قديم
          rm -f pubspec.yaml
          
          # إنشاء pubspec.yaml جديد متوافق مع Dart 3.3.0
          cat > pubspec.yaml << 'YAML'
          name: kimi_alfa
          description: Kimi Alfa Marketplace
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
            provider: ^6.1.1
            supabase_flutter: ^2.0.0
            carousel_slider: ^5.1.2
            flutter_animate: ^4.5.0
            flutter_svg: ^2.0.9
            image_picker: ^1.0.7
            cached_network_image: ^3.3.1
            shared_preferences: ^2.2.2
            intl: ^0.18.1
            url_launcher: ^6.2.2
            hive: ^2.2.3
            hive_flutter: ^1.1.0
            path_provider: ^2.0.0
            geolocator: ^11.1.0
            geocoding: ^3.0.0
            flutter_map: ^6.1.0
            latlong2: ^0.9.0
            flutter_local_notifications: ^17.2.4
            firebase_core: ^3.12.1
            firebase_messaging: ^15.2.4
            flutter_dotenv: ^5.1.0
            shimmer: ^3.0.0
            smooth_page_indicator: ^1.1.0
            flutter_screenutil: ^5.9.0
            google_fonts: ^6.1.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.1

          flutter:
            uses-material-design: true
            assets:
              - .env
              - assets/images/
              - assets/icons/svg/
              - assets/animations/
              - assets/fonts/
          YAML
          
          echo "pubspec.yaml created with path_provider ^2.0.0"
          cat pubspec.yaml | grep path_provider

      - name: Restore .env and assets
        run: |
          # استعادة .env من secrets إذا كان موجوداً
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
            cat > .env << 'ENV'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            MAP_API_KEY=${{ secrets.MAP_API_KEY }}
            ENV
          fi
          
          # التأكد من وجود مجلدات assets الأساسية
          mkdir -p assets/images assets/icons/svg assets/animations assets/fonts

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-apk
          path: build/app/outputs/flutter-apk/*.apk
