name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build
        run: |
          # حفظ الكود فقط (lib, pubspec.yaml, assets, .env)
          mkdir /tmp/code
          cp -r lib /tmp/code/
          cp pubspec.yaml /tmp/code/
          cp -r assets /tmp/code/ 2>/dev/null || true
          cp .env /tmp/code/ 2>/dev/null || true

          # حذف كل شيء (بما في ذلك android/ios)
          rm -rf android ios linux macos web windows

          # إنشاء مشروع Flutter جديد (سينشئ android/ios من الصفر)
          flutter create --org com.kimialfa --project-name kimi_alfa .

          # استعادة الكود المحفوظ (لا نستبدل android/ios)
          rm -rf lib assets
          cp -r /tmp/code/lib .
          cp -r /tmp/code/assets . 2>/dev/null || true
          cp /tmp/code/pubspec.yaml .
          cp /tmp/code/.env . 2>/dev/null || true

          # بناء التطبيق (كل شيء يديره Flutter تلقائياً)
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
