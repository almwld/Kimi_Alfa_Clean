workflows:
  build-apk:
    name: Build Android APK
    environment:
      flutter: 3.22.0
      xcode: latest
    scripts:
      - name: Force Gradle 8.9 and clear cache
        script: |
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          rm -rf ~/.gradle/caches/
          echo "✅ Gradle wrapper set to 8.9 and cache cleared"
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
